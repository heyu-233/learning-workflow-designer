<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{project_name}} 技能树</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --done: #d1fae5;
      --doing: #fef3c7;
      --todo: #e5e7eb;
      --accent: #2563eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 28px 20px 40px; }
    .header, .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .header { margin-bottom: 18px; }
    .grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 18px; }
    .node {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid #edf1f6;
    }
    .node:first-child { border-top: 0; padding-top: 0; }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .done { background: var(--done); color: #065f46; }
    .doing { background: var(--doing); color: #92400e; }
    .todo { background: var(--todo); color: #374151; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid #edf1f6; padding: 10px 8px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 700; }
    .feedback {
      border-left: 4px solid var(--accent);
      background: #eff6ff;
      padding: 12px 14px;
      margin-top: 10px;
      border-radius: 8px;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>{{project_name}} 技能树</h1>
      <p>{{subtitle}}</p>
    </div>
    <div class="grid">
      <section class="panel">
        <h2>能力节点</h2>
        {{nodes_html}}
      </section>
      <aside class="panel">
        <h2>章节映射</h2>
        {{chapter_table_html}}
        <h2 style="margin-top:18px;">本章获得</h2>
        <div class="feedback">{{chapter_gain}}</div>
        <h2 style="margin-top:18px;">下一步最小任务</h2>
        <div class="feedback">{{next_step}}</div>
      </aside>
    </div>
  </div>
</body>
</html>
