<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>$project_name 技能树</title>
  <style>
    :root {
      --bg: $skin_bg;
      --panel: $skin_panel;
      --panel-strong: $skin_panel_strong;
      --text: $skin_text;
      --muted: $skin_muted;
      --border: $skin_border;
      --done: #34d399;
      --doing: #fbbf24;
      --todo: #64748b;
      --accent: $skin_accent;
      --accent-2: $skin_accent_2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, color-mix(in srgb, var(--accent) 22%, transparent), transparent 32rem),
        linear-gradient(135deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 82%, var(--accent) 18%) 52%, color-mix(in srgb, var(--bg) 72%, var(--accent-2) 28%) 100%);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 20px 40px; }
    .header, .panel {
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, .22);
      backdrop-filter: blur(10px);
    }
    .header {
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: 1fr minmax(280px, 360px);
      gap: 18px;
      align-items: center;
    }
    .header h1 { margin: 0 0 8px; }
    .header p { margin: 0; color: var(--muted); }
    .hud { display: grid; gap: 8px; }
    .hud-row { display: flex; justify-content: space-between; gap: 12px; color: var(--muted); font-size: 14px; }
    .stars { color: var(--doing); letter-spacing: 1px; }
    .xp-bar, .meter { overflow: hidden; border-radius: 999px; background: rgba(148, 163, 184, .22); }
    .xp-bar { height: 12px; }
    .xp-bar span, .meter span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
    .layout { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 18px; align-items: start; }
    .skill-tree-map {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 26px 72px;
      padding: 18px 8px 8px;
    }
    .skill-tree-map::before {
      content: "";
      position: absolute;
      top: 54px;
      bottom: 54px;
      left: 50%;
      width: 3px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      border-radius: 999px;
      opacity: .55;
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent) 45%, transparent);
    }
    .tree-node {
      position: relative;
      min-height: 150px;
      isolation: isolate;
    }
    .tree-node:nth-child(odd) { grid-column: 1; }
    .tree-node:nth-child(even) { grid-column: 2; transform: translateY(42px); }
    .tree-node::before {
      content: "";
      position: absolute;
      top: 42px;
      width: 72px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent));
      opacity: .55;
      z-index: -1;
    }
    .tree-node:nth-child(odd)::before { right: -72px; }
    .tree-node:nth-child(even)::before { left: -72px; transform: rotate(180deg); }
    .node-core {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
      background: var(--panel-strong);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      min-height: 150px;
    }
    .node-orb {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff, var(--accent) 38%, color-mix(in srgb, var(--accent-2) 70%, #000));
      color: #07111f;
      font-weight: 800;
      box-shadow: 0 0 22px color-mix(in srgb, var(--accent) 55%, transparent);
    }
    .node-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; }
    .node-body h3 { margin: 0 0 4px; font-size: 16px; }
    .node-body p { margin: 0; color: var(--muted); }
    .meter { height: 8px; margin-top: 12px; }
    .node-meta, .node-prereq { display: flex; justify-content: space-between; gap: 12px; margin-top: 8px; color: var(--muted); font-size: 13px; }
    .node-prereq { display: block; color: color-mix(in srgb, var(--accent) 65%, var(--muted)); }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .done.badge { background: rgba(52, 211, 153, .18); color: #a7f3d0; }
    .doing.badge { background: rgba(251, 191, 36, .18); color: #fde68a; }
    .todo.badge { background: rgba(100, 116, 139, .22); color: #cbd5e1; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { border-bottom: 1px solid var(--border); padding: 10px 8px; text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 700; }
    .feedback {
      border-left: 4px solid var(--accent);
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      padding: 12px 14px;
      margin-top: 10px;
      border-radius: 8px;
    }
    .side-stack { display: grid; gap: 18px; }
    @media (max-width: 980px) {
      .layout, .header { grid-template-columns: 1fr; }
      .skill-tree-map { grid-template-columns: 1fr; gap: 18px; }
      .skill-tree-map::before, .tree-node::before { display: none; }
      .tree-node:nth-child(odd), .tree-node:nth-child(even) { grid-column: 1; transform: none; }
    }
  </style>
</head>
<body data-skin="$skin">
  <div class="wrap">
    <div class="header">
      <div>
        <h1>$project_name 技能树</h1>
        <p>$subtitle</p>
      </div>
      <div class="hud" aria-label="学习进度">
        <div class="hud-row"><strong>Lv. $level / $total_levels</strong><span class="stars">$stars</span></div>
        <div class="xp-bar"><span style="width:$xp_percent%"></span></div>
        <div class="hud-row"><span>$mode / $density</span><span>$earned_xp / $total_xp XP</span></div>
        <div class="hud-row"><span>$level_rule</span></div>
      </div>
    </div>
    <div class="layout">
      <section class="panel">
        <h2>能力树</h2>
        $nodes_html
      </section>
      <aside class="side-stack">
        <section class="panel">
          <h2>等级规则</h2>
          $level_table_html
        </section>
        <section class="panel">
          <h2>章节映射</h2>
          $chapter_table_html
        </section>
        <section class="panel">
          <h2>本章获得</h2>
          <div class="feedback">$chapter_gain</div>
          <h2 style="margin-top:18px;">技能树进度</h2>
          <div class="feedback">$skill_tree_progress</div>
          <h2 style="margin-top:18px;">下一步最小任务</h2>
          <div class="feedback">$next_step</div>
        </section>
      </aside>
    </div>
    <script type="application/json" id="learning-progress">$progress_json</script>
  </div>
</body>
</html>
